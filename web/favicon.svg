<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#0a0e0f"/>
  <!-- Wheat stalk -->
  <g stroke="#4ade80" stroke-width="4" stroke-linecap="round" fill="none">
    <!-- Center stem -->
    <line x1="50" y1="82" x2="50" y2="28"/>
    <!-- Left grains -->
    <path d="M50 40 Q38 34 34 42"/>
    <path d="M50 50 Q36 44 32 54"/>
    <path d="M50 60 Q36 54 32 66"/>
