  <!-- Leaf accents -->
  <path d="M50 74 Q42 78 38 86" stroke="#22c55e" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M50 74 Q58 78 62 86" stroke="#22c55e" stroke-width="3.5" fill="none" stroke-linecap="round"/>
